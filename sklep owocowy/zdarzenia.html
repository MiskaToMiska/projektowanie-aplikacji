<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sklep Owocowy</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f8fafc;
        color: #334155;

        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      main {
        padding: 20px;
        max-width: 1500px;
        margin: 0 auto;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      header {
        background-color: #0f172a;
        padding: 20px;
        padding-bottom: 10px;
        text-align: center;
      }

      header h1 {
        color: #f8fafc;
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      header h2 {
        color: #cbd5e1;
        margin-top: 5px;
        font-weight: normal;
      }

      .logo {
        max-width: 150px;
        height: auto;
      }

      .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px;
        flex: 1;
        min-height: 0;
        grid-auto-rows: minmax(240px, 1fr);
        justify-items: stretch;
      }

      .grid-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        cursor: pointer;
      }

      footer {
        background-color: #1e293b;
        color: #cbd5e1;
        text-align: center;
        padding: 15px;
        margin-top: 0;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body onload="startTime()">
    <header>
      <img src="/img/logo.png" alt="Logo Sklepu" class="logo" />
      <h1>SKLEP OWOCOWY</h1>
      <h2 id="zegar"></h2>
    </header>

    <main>
      <div class="grid-container">
        <img
          src="/img/jablko.jpg"
          alt="Jabłko"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />
        <img
          src="/img/borowka.jpg"
          alt="Borówka"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />

        <img
          src="/img/smoczyowoc.jpg"
          alt="Smoczy Owoc"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />

        <img
          src="/img/ananas.jpg"
          alt="Ananas"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />

        <img
          src="/img/gruszka.webp"
          alt="Gruszka"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />

        <img
          src="/img/wisnia.webp"
          alt="Wiśnia"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />

        <img
          src="/img/truskawka.jpg"
          alt="Truskawka"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />
        <img
          src="/img/pomidor.jpg"
          alt="Pomidor"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />
        <img
          src="/img/pomarancza.webp"
          alt="Pomarańcza"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />
        <img
          src="/img/awokado.jpg"
          alt="Awokado"
          onmouseover="hoverOn(this)"
          onmouseout="hoverOff(this)"
        />
      </div>
    </main>

    <footer>© 2026 Sklep Owocowy</footer>

    <script>
      function hoverOn(el) {
        el.style.transform = "scale(1.05)";
        el.style.boxShadow = "0 10px 15px rgba(0,0,0,0.2)";
      }

      function hoverOff(el) {
        el.style.transform = "scale(1)";
        el.style.boxShadow = "0 4px 6px rgba(0,0,0,0.1)";
      }

      function startTime() {
        const today = new Date();
        let h = today.getHours();
        let m = today.getMinutes();
        let s = today.getSeconds();

        m = checkTime(m);
        s = checkTime(s);

        document.getElementById("zegar").innerHTML = h + ":" + m + ":" + s;
        setTimeout(startTime, 1000);
      }

      function checkTime(i) {
        return i < 10 ? "0" + i : i;
      }
    </script>
  </body>
</html>
